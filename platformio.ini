; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = espidf

[env:luce_stage0]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=0

[env:luce_stage1]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=1

[env:luce_stage2]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=2

[env:luce_stage3]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=3

[env:luce_stage4]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=4
  -DLUCE_STAGE4_DIAG=1
  -DLUCE_STAGE4_LCD=1
  -DLUCE_STAGE4_CLI=1

[env:luce_stage5]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=5

[env:luce_stage6]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=6

[env:luce_stage7]
platform = espressif32
board = nodemcu-32s
framework = espidf
build_flags =
  -DLUCE_STAGE=7
  -DCONFIG_LWIP_MDNS_RESPONDER=1
  -DLWIP_MDNS_RESPONDER=1

[env:luce_test_native]
platform = native
test_framework = unity
test_build_src = false
lib_compat_mode = off
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
